apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: online-boutique-alerts
  namespace: monitoring
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
  - name: online-boutique.rules
    rules:
    - alert: OnlineBoutiqueFrontendDown
      expr: probe_success{job="online-boutique-frontend"} == 0
      for: 1m
      labels:
        severity: critical
        service: online-boutique
      annotations:
        summary: "Online Boutique frontend is down"
        description: "Frontend HTTP probe has failed for more than 1 minute."

    - alert: OnlineBoutiquePodRestarting
      expr: increase(kube_pod_container_status_restarts_total{namespace="prod"}[10m]) > 0
      for: 1m
      labels:
        severity: warning
        service: online-boutique
      annotations:
        summary: "Pod restart detected in Online Boutique"
        description: "A container in namespace prod restarted within the last 10 minutes."

    - alert: OnlineBoutiqueDeploymentReplicasUnavailable
      expr: kube_deployment_status_replicas_available{namespace="prod"} < 1
      for: 1m
      labels:
        severity: critical
        service: online-boutique
      annotations:
        summary: "Deployment has no available replicas"
        description: "A deployment in namespace prod has less than 1 available replica."
