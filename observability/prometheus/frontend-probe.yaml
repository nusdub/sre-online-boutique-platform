apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: online-boutique-frontend-probe
  namespace: monitoring
  labels:
    prometheus: k8s
spec:
  jobName: online-boutique-frontend
  interval: 15s
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc:19115
  targets:
    staticConfig:
      static:
      - http://frontend.prod.svc.cluster.local:80
